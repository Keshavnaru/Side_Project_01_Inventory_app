<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Inventory System</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <h1>Inventory System</h1>
    <div id="clock"></div>

    <h2>Add New Item (Permanent)</h2>
    <input type="text" id="newItemName" placeholder="Item Name" />
    <input type="text" id="newItemType" placeholder="Item Type" />
    <button onclick="addMasterItem()">Add Item</button>

    <h2>Inventory Entry (Daily)</h2>
    <select id="itemSelect"></select>
    <input type="number" id="stockQty" placeholder="Stock in Store" />
    <input type="number" id="systemQty" placeholder="Stock in System" />
    <input type="number" id="soldQty" placeholder="Sold" />
    <button onclick="addInventory()">Add Inventory</button>

    <button onclick="exportExcel()">Export Excel</button>

    <h2>Today’s Inventory</h2>
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Item</th>
          <th>Type</th>
          <th>Store</th>
          <th>System</th>
          <th>Sold</th>
          <th>Date</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>All Items (Permanent)</h2>
    <table id="masterTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="js/xlsx.full.min.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/app.js"></script>
    <script src="js/excel.js"></script>
  </body>
</html>
