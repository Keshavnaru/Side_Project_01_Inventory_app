<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h2>Add New Item (Permanent)</h2>
    <input type="text" id="newItemName" placeholder="Item Name" />
    <input type="text" id="newItemType" placeholder="Item Type" />
    <button onclick="addMasterItem()">Add Item</button>

<div class="form">
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="text" id="itemType" placeholder="Item Type">
    <input type="number" id="stockQty" placeholder="Item in Stock">
    <input type="number" id="systemQty" placeholder="Item in System">
    <input type="number" id="soldQty" placeholder="Sold (optional)">
    <button onclick="addItem()">Add Item</button>
    <button onclick="clearAll()">Clear All</button>
    <button onclick="exportExcel()">Export to Excel</button>
</div>

    <button onclick="exportExcel()">Export Excel</button>

    <h2>Today’s Inventory</h2>
    <table id="inventoryTable">
      <thead>
        <tr>
            <th>Item Name</th>
            <th>Type</th>
            <th>In Stock</th>
            <th>In System</th>
            <th>Sold</th>
            <th>Date</th>
            <th>Time</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>All Items (Permanent)</h2>
    <table id="masterTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

<!-- Load JS files in proper order -->
<script src="js/xlsx.full.min.js"></script>
<script src="js/clock.js"></script>
<script src="js/app.js"></script>
<script src="js/excel.js"></script>
</body>
</html>
